<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>3.1 Phillip Lim — on Ounass</title>
<link rel="stylesheet" href="../design-system/styles.css">
<style>
  html, body { margin: 0; padding: 0; background: #050505; overflow: hidden; height: 100%; width: 100%; font-family: var(--sans); }
  #root { position: fixed; inset: 0; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>

<div id="root"></div>

<script type="text/babel" src="animations.jsx"></script>
<script type="text/babel" src="scene.jsx"></script>

<script type="text/babel">
  const { Stage } = window;

  function App() {
    return (
      <Stage width={1080} height={1920} duration={9} background="#0A0A0A" persistKey="pl-ad">
        <window.PromoScene/>
      </Stage>
    );
  }

  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(<App/>);
</script>

</body>
</html>

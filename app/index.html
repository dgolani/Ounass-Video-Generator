<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ounass Cutroom</title>
    <meta
      name="description"
      content="Ounass Cutroom — Cut. Brand. Ship. In-browser video ads for the marketing team."
    />
    <!-- Favicon set. Modern browsers pick the SVG; the 16×16 SVG variant
         is tuned for tab-strip rendering (thicker ring, simpler card)
         so the mark doesn't dissolve at icon size. Theme color drives
         the PWA-ish chrome on mobile Safari + the tab background tint
         on Edge / Chrome's dark mode. -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/svg+xml" sizes="16x16" href="/favicon-16.svg" />
    <link rel="mask-icon" href="/favicon.svg" color="#B87253" />
    <meta name="theme-color" content="#0E0B09" />
    <!--
      Typography: ALL families are self-hosted.
      - Portrait, Noto Serif Display, Noto Kufi Arabic → app/src/assets/fonts/,
        registered via app/src/styles/fonts.css.
      - Fraunces, Nunito Sans, Cormorant Garamond, Playfair Display, Inter,
        DM Sans, Noto Naskh Arabic, Cairo → vendored from Google Fonts into
        app/src/assets/fonts/google/, registered via app/src/styles/google-fonts.css.
      Do NOT reintroduce a fonts.googleapis.com <link>: export-time font
      embedding (getFontEmbedCSS in lib/export.ts) must re-fetch every font,
      and corporate proxies / ad-blockers blocking Google Fonts made exports
      render in system fonts (text wrapped + overlapped) on marketing machines.
    -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
